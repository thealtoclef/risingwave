name: Release Docker Image

on:
  workflow_dispatch: # for manual testing
    inputs:
      cargo_profile:
        description: "Cargo profile to use for build"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release
          - production
  push:
    # Publish semver tags as releases:
    tags: ["*.*.*"]

jobs:
  call-docker-release:
    permissions:
      contents: write
      packages: write
    uses: thealtoclef/modular-automations/.github/workflows/docker-release.yaml@main
    with:
      force_build: true
      dockerfile_path: docker/Dockerfile
      build_args: |
        GIT_SHA=${{ github.sha }}
        CARGO_PROFILE=${{ github.event_name == 'workflow_dispatch' && inputs.cargo_profile || 'production' }}
